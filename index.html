<style>

  :root[data-theme="dark"] {
    --bg: #14110d;
    --paper: #1c1813;
    --ink: #ece6da;
    --muted: rgba(236,230,218,.55);
    --faint: rgba(236,230,218,.25);
    --rule: rgba(236,230,218,.16);
    --rule-soft: rgba(236,230,218,.08);
  }
  :root[data-font="grotesk"] {
    --display: 'IBM Plex Sans', system-ui, sans-serif;
  }
  :root[data-font="mono"] {
    --display: 'IBM Plex Mono', ui-monospace, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: var(--sans);
    font-size: 15px; line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: var(--bg); }

  /* Schematic dot grid background, fixed */
  #dot-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(rgba(26,24,20,.13) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: linear-gradient(180deg, #000 0%, transparent 95%);
  }
  :root[data-theme="dark"] #dot-bg {
    background-image: radial-gradient(rgba(236,230,218,.10) 1px, transparent 1px);
  }
  /* ASCII particle layer (subtle, behind content) */
  #ascii-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    font: 400 12px/1.2 var(--mono);
    color: var(--faint); white-space: pre; user-select: none;
    overflow: hidden; opacity: .35;
    mix-blend-mode: multiply;
  }
  :root[data-theme="dark"] #ascii-bg { mix-blend-mode: screen; opacity: .22; }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(14px);
    transition: opacity .7s ease, transform .7s cubic-bezier(.2,.7,.3,1); }
  .reveal.in { opacity: 1; transform: none; }

  kbd {
    background: var(--paper); border: 1px solid var(--rule);
    padding: 1px 6px; border-radius: 3px;
    font: 400 11px var(--mono); color: var(--ink);
  }

  hr.rule { border: 0; border-top: 1px solid var(--rule); margin: 0; }

  .lbl-mono {
    font: 400 10.5px var(--mono);
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted);
  }
  .lbl-mono .num { color: var(--accent); }

  .display { font-family: var(--display); letter-spacing: -.02em; font-weight: 500; }

  .hover-line { position: relative; }
  .hover-line::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -2px;
    height: 1px; background: var(--accent); transform: scaleX(0);
    transform-origin: left; transition: transform .25s ease;
  }
  .hover-line:hover::after { transform: scaleX(1); }

  .focus-outline:focus-visible { outline: 1px solid var(--accent); outline-offset: 3px; }

  /* Mobile / tablet adjustments */
  @media (max-width: 880px) {

      row-gap: 14px !important;
    }
    /* Tighten header padding */
    header > div {
      padding-left: 20px !important;
      padding-right: 20px !important;
    }
    /* Stack two-column row grids (160px | 1fr etc.) */
    .stack-grid {
      grid-template-columns: 1fr !important;
      gap: 6px !important;
    }
    /* Stack project article: 60 | 1fr | 200 → 1 col */

      grid-template-columns: 1fr !important;

    }
    /* Stack list rows (talks / news / oss) into a single column */

<script>
  // Slow ASCII drift behind the dot grid — sparse + subtle.
  (function() {
    const el = document.getElementById('ascii-bg');
    const chars = [' ',' ',' ',' ',' ',' ',' ',' ',' ','·','·','·','·','+','+','*','◇','○','●'];
    let cols = 0, rows = 0;
    function size() {
      cols = Math.ceil(window.innerWidth / 7.5);
      rows = Math.ceil(window.innerHeight / 14.4);
    }
    size(); window.addEventListener('resize', size);
    let t = 0;
    function frame() {
      t += 0.006;
      const lines = new Array(rows);
      for (let y = 0; y < rows; y++) {
        let line = '';
        for (let x = 0; x < cols; x++) {
          const v = Math.sin((x*0.05) + t) + Math.cos((y*0.07) - t*0.6) + Math.sin((x+y)*0.03 + t*0.8);
          const idx = ((v + 3.5) * 2.7) | 0;
          line += chars[Math.max(0, Math.min(chars.length - 1, idx))];
        }
        lines[y] = line;
      }
      el.textContent = lines.join('\n');
      requestAnimationFrame(frame);
    }
    frame();
  })();
</script>
